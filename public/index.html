<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CrazyApi — API Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07080e;--s1:#0e0e1a;--s2:#141422;--s3:#1c1c2e;--s4:#242438;
  --b:#1f1f33;--b2:#2b2b45;--b3:#3a3a58;
  --ac:#6c63ff;--ac2:#a78bfa;--acl:rgba(108,99,255,.1);
  --gr:#22c55e;--rd:#ef4444;--yw:#f59e0b;--pk:#ec4899;--bl:#3b82f6;
  --tx:#f0f0f8;--tx2:#8888a8;--dim:#404060;
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;overflow:hidden;height:100vh}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:linear-gradient(var(--b) 0%,transparent 0%) 0 0/44px 44px,linear-gradient(90deg,var(--b) 0%,transparent 0%) 0 0/44px 44px;background-attachment:fixed;opacity:.4}

/* NAV */
#nav{position:fixed;top:0;left:0;right:0;z-index:200;height:52px;display:flex;align-items:center;padding:0 1.25rem;gap:1.25rem;background:rgba(7,8,14,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--b)}
.logo{font-weight:800;font-size:1.1rem;letter-spacing:-.4px;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none;flex-shrink:0}
.nav-links{display:flex;gap:.1rem}
.nl{padding:.32rem .7rem;border-radius:6px;color:var(--tx2);font-size:.78rem;font-weight:500;text-decoration:none;transition:all .13s;white-space:nowrap}
.nl:hover,.nl.on{color:var(--tx);background:var(--s3)}
.nav-right{margin-left:auto;display:flex;gap:.4rem;align-items:center;flex-shrink:0}
.nb{padding:.32rem .875rem;border-radius:6px;font-size:.77rem;font-weight:600;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all .13s;text-decoration:none;display:inline-block}
.nb-o{background:var(--s3);color:var(--tx2);border:1px solid var(--b2)}
.nb-o:hover{color:var(--tx)}
.nb-s{background:var(--ac);color:#fff}
.nb-s:hover{background:var(--ac2)}
.stat-chip{font-family:'Geist Mono',monospace;font-size:.68rem;color:var(--tx2);display:flex;align-items:center;gap:.3rem}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--gr);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* LAYOUT */
.layout{display:flex;height:100vh;padding-top:52px}

/* SIDEBAR */
.sidebar{width:210px;flex-shrink:0;border-right:1px solid var(--b);overflow-y:auto;background:var(--s1);padding:.6rem 0}
.sidebar::-webkit-scrollbar{width:2px}
.sidebar::-webkit-scrollbar-thumb{background:var(--b2)}
.sb-section{font-size:.55rem;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--dim);padding:0 .875rem;margin:.875rem 0 .25rem;font-family:'Geist Mono',monospace}
.sb-btn{display:flex;align-items:center;gap:.5rem;padding:.38rem .875rem;color:var(--tx2);font-size:.79rem;font-weight:500;cursor:pointer;transition:all .12s;background:none;border:none;width:100%;text-align:left;font-family:'Inter',sans-serif;border-left:2px solid transparent;white-space:nowrap}
.sb-btn:hover{color:var(--tx);background:var(--s2)}
.sb-btn.on{color:var(--ac2);background:var(--acl);border-left-color:var(--ac)}
.sb-cnt{margin-left:auto;font-size:.58rem;font-family:'Geist Mono',monospace;background:var(--s3);color:var(--dim);padding:0 4px;border-radius:3px;flex-shrink:0}

/* CONTENT */
.content{flex:1;overflow-y:auto;background:var(--bg)}
.content::-webkit-scrollbar{width:4px}
.content::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

/* GROUP PANEL */
.grp{display:none;padding:1.5rem 1.75rem 3rem;max-width:920px}
.grp.on{display:block}
.grp-hdr{margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--b)}
.grp-title{font-size:1.2rem;font-weight:800;letter-spacing:-.4px;display:flex;align-items:center;gap:.5rem;margin-bottom:.25rem}
.grp-desc{color:var(--tx2);font-size:.82rem;line-height:1.6}
.sub-title{font-size:.6rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim);font-family:'Geist Mono',monospace;margin:1.25rem 0 .5rem;padding-bottom:.35rem;border-bottom:1px solid var(--b)}

/* ENDPOINT */
.ep{background:var(--s1);border:1px solid var(--b);border-radius:9px;overflow:hidden;margin-bottom:.5rem;transition:border-color .15s}
.ep:hover{border-color:var(--b2)}
.ep-hdr{display:flex;align-items:center;gap:.6rem;padding:.7rem 1rem;cursor:pointer;user-select:none;transition:background .12s}
.ep-hdr:hover{background:var(--s2)}
.badge{padding:2px 7px;border-radius:4px;font-size:.58rem;font-weight:700;font-family:'Geist Mono',monospace;flex-shrink:0;letter-spacing:.5px}
.get{background:rgba(34,197,94,.1);color:#4ade80}
.post{background:rgba(245,158,11,.1);color:#fbbf24}
.ep-path{font-family:'Geist Mono',monospace;font-size:.74rem;color:var(--tx2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ep-label{color:var(--tx2);font-size:.74rem;margin-left:auto;flex-shrink:0;display:none}
@media(min-width:800px){.ep-label{display:block}}
.chv{color:var(--dim);font-size:.55rem;transition:transform .2s;flex-shrink:0;margin-left:.4rem}
.chv.open{transform:rotate(180deg)}
.ep-body{display:none;border-top:1px solid var(--b)}
.ep-body.open{display:block}
.ep-inner{padding:1.1rem}

/* PARAMS */
.ptbl{width:100%;border-collapse:collapse;font-size:.76rem;margin-bottom:1.1rem}
.ptbl th{background:var(--s2);color:var(--tx2);text-align:left;padding:.42rem .75rem;font-size:.57rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.ptbl th:first-child{border-radius:6px 0 0 6px}
.ptbl th:last-child{border-radius:0 6px 6px 0}
.ptbl td{padding:.52rem .75rem;border-bottom:1px solid var(--b);color:var(--tx);vertical-align:top}
.ptbl tr:last-child td{border-bottom:none}
.pn{font-family:'Geist Mono',monospace;color:var(--ac2);font-size:.7rem}
.pt{font-family:'Geist Mono',monospace;color:var(--pk);font-size:.68rem}
.req{background:rgba(239,68,68,.1);color:#fca5a5;font-size:.56rem;padding:0 4px;border-radius:3px;margin-left:3px;font-family:'Geist Mono',monospace}
.opt{background:var(--s3);color:var(--dim);font-size:.56rem;padding:0 4px;border-radius:3px;margin-left:3px;font-family:'Geist Mono',monospace}

/* CODE TABS */
.cw{border:1px solid var(--b);border-radius:7px;overflow:hidden;margin-bottom:1.1rem}
.ct{display:flex;background:var(--s2);border-bottom:1px solid var(--b);padding:3px 3px 0;gap:1px}
.ctab{padding:.26rem .75rem;border-radius:5px 5px 0 0;font-size:.68rem;font-weight:600;cursor:pointer;background:none;border:none;color:var(--dim);font-family:'Inter',sans-serif;transition:all .12s}
.ctab.on{background:var(--s3);color:var(--tx2)}
.cpanel{display:none;background:var(--bg);padding:.875rem;font-family:'Geist Mono',monospace;font-size:.7rem;line-height:1.75;color:var(--ac2);white-space:pre;overflow-x:auto}
.cpanel.on{display:block}

/* TRY IT */
.try{background:var(--s2);border:1px solid var(--b);border-radius:7px;overflow:hidden}
.try-hdr{padding:.52rem .875rem;background:var(--s3);border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between}
.try-lbl{font-size:.58rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--dim);font-family:'Geist Mono',monospace}
.try-st{font-size:.68rem;font-family:'Geist Mono',monospace}
.ok{color:var(--gr)}.er{color:var(--rd)}.ms{color:var(--dim);margin-left:.3rem}
.try-body{padding:.875rem}
.tfields{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.6rem}
.tf{flex:1;min-width:110px;padding:.42rem .75rem;background:var(--s1);border:1px solid var(--b2);border-radius:6px;color:var(--tx);font-family:'Geist Mono',monospace;font-size:.71rem;outline:none;transition:border-color .15s}
.tf:focus{border-color:var(--ac)}
.tf::placeholder{color:var(--dim)}
.tbtn{padding:.42rem 1rem;background:var(--ac);color:#fff;border:none;border-radius:6px;font-weight:700;font-size:.75rem;cursor:pointer;font-family:'Inter',sans-serif;transition:all .12s;display:flex;align-items:center;gap:.4rem}
.tbtn:hover{background:var(--ac2)}
.tbtn:disabled{opacity:.5;cursor:not-allowed}
.spin{display:none;width:10px;height:10px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .5s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.resp{display:none;background:var(--bg);border-top:1px solid var(--b);padding:.875rem;font-family:'Geist Mono',monospace;font-size:.7rem;color:var(--tx);max-height:260px;overflow-y:auto;white-space:pre-wrap;line-height:1.7}
.resp.on{display:block}
.resp::-webkit-scrollbar{width:3px}
.resp::-webkit-scrollbar-thumb{background:var(--b2)}
.jk{color:var(--ac2)}.jv{color:#86efac}.jn{color:#fbbf24}.jb{color:var(--pk)}

/* TOAST */
.toast{position:fixed;bottom:1.2rem;right:1.2rem;background:var(--s3);border:1px solid var(--b2);color:var(--tx);padding:.55rem 1rem;border-radius:7px;font-size:.78rem;font-weight:600;z-index:9999;transform:translateY(14px);opacity:0;transition:all .22s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
</style>
</head>
<body>

<!-- NAV -->
<nav id="nav">
  <a class="logo" href="/">CrazyApi</a>
  <nav class="nav-links">
    <a class="nl on" href="/">APIs</a>
    <a class="nl" href="/home.html">Home</a>
    <a class="nl" href="/docs.html">Docs</a>
    <a class="nl" href="/changelog.html">Changelog</a>
    <a class="nl" href="/contact.html">Contact</a>
  </nav>
  <div class="stat-chip"><span class="live-dot"></span><span id="ns-up">—</span> · <span id="ns-mem">—</span> · <span id="ns-req">—</span> req</div>
  <div class="nav-right">
    <a class="nb nb-o" href="/login.html">Login</a>
    <a class="nb nb-s" href="/register.html">Get API Key →</a>
  </div>
</nav>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-section">Categories</div>
    <button class="sb-btn" id="sb-ai"         onclick="show('ai')">        🤖 AI & Chat        <span class="sb-cnt">21</span></button>
    <button class="sb-btn" id="sb-downloader" onclick="show('downloader')">⬇️ Downloaders      <span class="sb-cnt">10</span></button>
    <button class="sb-btn" id="sb-tools"      onclick="show('tools')">     🛠️ Dev Tools        <span class="sb-cnt">15</span></button>
    <button class="sb-btn" id="sb-anime"      onclick="show('anime')">     🎌 Anime            <span class="sb-cnt">10</span></button>
    <button class="sb-btn" id="sb-search"     onclick="show('search')">    🔍 Search           <span class="sb-cnt">10</span></button>
    <button class="sb-btn" id="sb-sports"     onclick="show('sports')">    ⚽ Sports           <span class="sb-cnt">8</span></button>
    <button class="sb-btn" id="sb-stalker"    onclick="show('stalker')">   🕵️ Stalker          <span class="sb-cnt">7</span></button>
    <button class="sb-btn" id="sb-checker"    onclick="show('checker')">   ✅ Checker          <span class="sb-cnt">5</span></button>
    <button class="sb-btn" id="sb-tempgen"    onclick="show('tempgen')">   📧 TempGen          <span class="sb-cnt">7</span></button>
    <button class="sb-btn" id="sb-shortener"  onclick="show('shortener')"> 🔗 Shortener        <span class="sb-cnt">4</span></button>
    <button class="sb-btn" id="sb-fun"        onclick="show('fun')">       😂 Fun              <span class="sb-cnt">29</span></button>
    <div class="sb-section" style="margin-top:1.25rem">Account</div>
    <a class="sb-btn" href="/dashboard.html">👤 My Dashboard</a>
  </aside>

  <!-- CONTENT -->
  <div class="content" id="content">
    <!-- groups injected by JS -->
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ─ helpers ────────────────────────────────────────────────────────────────
let _tt;
const toast=m=>{const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2500);};
const esc=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const hl=j=>j.replace(/("(?:[^"\\]|\\.)*")\s*:/g,'<span class="jk">$1</span>:').replace(/:\s*("(?:[^"\\]|\\.)*")/g,': <span class="jv">$1</span>').replace(/:\s*(true|false|null)/g,': <span class="jb">$1</span>').replace(/:\s*(-?\d+\.?\d*)/g,': <span class="jn">$1</span>');

// ─ toggle endpoint ────────────────────────────────────────────────────────
function tog(id){const b=document.getElementById(id+'-b'),c=document.getElementById(id+'-c');b?.classList.toggle('open');c?.classList.toggle('open');}

// ─ code tabs ─────────────────────────────────────────────────────────────
function stab(id,l){['curl','js','py'].forEach(x=>{document.getElementById(id+'-t-'+x)?.classList.toggle('on',x===l);document.getElementById(id+'-p-'+x)?.classList.toggle('on',x===l);});}

// ─ fire endpoint ─────────────────────────────────────────────────────────
async function fire(id,method,path,fields){
  const btn=document.getElementById(id+'-btn'),spin=document.getElementById(id+'-spin'),out=document.getElementById(id+'-out'),stat=document.getElementById(id+'-stat');
  spin.style.display='inline-block';btn.disabled=true;out.classList.remove('on');if(stat)stat.innerHTML='';
  const p=new URLSearchParams();
  fields.forEach(n=>{const el=document.getElementById(id+'-f-'+n);if(el?.value)p.set(n,el.value);});
  const url=path+'?'+p,t0=Date.now();
  try{
    const r=await fetch(url,{method});const ms=Date.now()-t0;const d=await r.json();
    if(stat)stat.innerHTML=`<span class="${r.ok?'ok':'er'}">● ${r.status}</span><span class="ms">${ms}ms</span>`;
    out.innerHTML=hl(JSON.stringify(d,null,2));out.classList.add('on');
  }catch(ex){if(stat)stat.innerHTML='<span class="er">● Error</span>';out.innerHTML=esc('{"error":"'+ex.message+'"}');out.classList.add('on');}
  spin.style.display='none';btn.disabled=false;
}

// ─ build one card ─────────────────────────────────────────────────────────
function card(ep,id){
  const rows=ep.p.map(p=>`<tr><td><span class="pn">${esc(p.n)}</span><span class="${p.r?'req':'opt'}">${p.r?'required':'optional'}</span></td><td><span class="pt">${esc(p.t)}</span></td><td style="color:var(--tx2);font-size:.74rem">${esc(p.d)}</td></tr>`).join('');
  const flds=ep.f.map(([n,v])=>`<input class="tf" id="${id}-f-${esc(n)}" placeholder="${esc(n)}" value="${esc(v)}"/>`).join('');
  const base=location.origin;
  const qs=ep.f.filter(([,v])=>v).map(([n,v])=>`${n}=${encodeURIComponent(v)}`).join('&');
  const full=`${base}${ep.path}?${qs}`;
  const curl=`curl "${full}"`;
  const js=`const axios = require('axios');\n\nconst { data } = await axios.get('${full}');\nconsole.log(data.result);`;
  const py=`import requests\nr = requests.get('${base}${ep.path}',\n    params={\n${ep.f.map(([n,v])=>`        '${n}': '${v}'`).join(',\n')}\n    })\nprint(r.json()['result'])`;
  const fns=ep.f.map(([n])=>`'${n}'`).join(',');
  return`<div class="ep">
  <div class="ep-hdr" onclick="tog('${id}')">
    <span class="badge ${ep.m.toLowerCase()}">${ep.m}</span>
    <span class="ep-path">${esc(ep.path)}</span>
    <span class="ep-label">${esc(ep.d)}</span>
    <span class="chv" id="${id}-c">▼</span>
  </div>
  <div class="ep-body" id="${id}-b">
    <div class="ep-inner">
      <table class="ptbl"><thead><tr><th>Parameter</th><th>Type</th><th>Description</th></tr></thead><tbody>${rows}</tbody></table>
      <div class="cw">
        <div class="ct">
          <button class="ctab on" id="${id}-t-curl" onclick="stab('${id}','curl')">cURL</button>
          <button class="ctab" id="${id}-t-js"   onclick="stab('${id}','js')">JavaScript</button>
          <button class="ctab" id="${id}-t-py"   onclick="stab('${id}','py')">Python</button>
        </div>
        <div class="cpanel on" id="${id}-p-curl">${esc(curl)}</div>
        <div class="cpanel"    id="${id}-p-js">${esc(js)}</div>
        <div class="cpanel"    id="${id}-p-py">${esc(py)}</div>
      </div>
      <div class="try">
        <div class="try-hdr"><span class="try-lbl">⚡ Try it live</span><span class="try-st" id="${id}-stat"></span></div>
        <div class="try-body">
          <div class="tfields">${flds}</div>
          <button class="tbtn" id="${id}-btn" onclick="fire('${id}','${ep.m}','${esc(ep.path)}',[${fns}])">Send <div class="spin" id="${id}-spin"></div></button>
          <div class="resp" id="${id}-out"></div>
        </div>
      </div>
    </div>
  </div>
</div>`;
}

// ─ build group panel ──────────────────────────────────────────────────────
function buildGroup(gid){
  const cat=CATS[gid];
  let html=`<div class="grp" id="grp-${gid}">
<div class="grp-hdr">
  <div class="grp-title">${cat.icon} ${cat.label}</div>
  <div class="grp-desc">${cat.desc}</div>
</div>`;
  cat.groups.forEach(g=>{
    html+=`<div class="sub-title">${g.title}</div>`;
    g.eps.forEach((ep,i)=>{ html+=card(ep,`${gid}-${g.id}-${i}`); });
  });
  return html+'</div>';
}

// ─ show group ─────────────────────────────────────────────────────────────
const built=new Set();
function show(gid){
  document.querySelectorAll('.grp').forEach(g=>g.classList.remove('on'));
  document.querySelectorAll('.sb-btn').forEach(b=>b.classList.remove('on'));
  if(!built.has(gid)){
    document.getElementById('content').insertAdjacentHTML('beforeend',buildGroup(gid));
    built.add(gid);
  }
  document.getElementById('grp-'+gid).classList.add('on');
  document.getElementById('sb-'+gid)?.classList.add('on');
  document.getElementById('content').scrollTo(0,0);
}

// ─ DEFINITIONS ────────────────────────────────────────────────────────────
const P=(n,t,r,d)=>({n,t,r,d});
const E=(m,path,d,p,f)=>({m,path,d,p,f});

const CATS={
ai:{label:'AI & Chat',icon:'🤖',desc:'GPT-4o, Gemini, DeepSeek, Llama, Mistral, Flux image generation, translate, code, story, bio and more. Powered by Pollinations.ai (free, no extra key needed).',groups:[
  {id:'chat',title:'Chat Models',eps:[
    E('GET','/api/ai/ai','AI Chat',[P('apikey','string',true,'Your API key'),P('q','string',true,'Your message')],[['apikey','your_key'],['q','What is the capital of France?']]),
    E('GET','/api/ai/gpt4','GPT-4o',[P('apikey','string',true,'Your API key'),P('q','string',true,'Your message')],[['apikey','your_key'],['q','Explain quantum computing simply']]),
    E('GET','/api/ai/gpt4mini','GPT-4o Mini',[P('apikey','string',true,'Your API key'),P('q','string',true,'Your message')],[['apikey','your_key'],['q','Tell me a fun fact']]),
    E('GET','/api/ai/gemini','Google Gemini',[P('apikey','string',true,'Your API key'),P('q','string',true,'Your message')],[['apikey','your_key'],['q','What is machine learning?']]),
    E('GET','/api/ai/deepseek','DeepSeek AI',[P('apikey','string',true,'Your API key'),P('q','string',true,'Your message')],[['apikey','your_key'],['q','Write a short poem about the ocean']]),
    E('GET','/api/ai/llama','LLaMA',[P('apikey','string',true,'Your API key'),P('q','string',true,'Your message')],[['apikey','your_key'],['q','How does photosynthesis work?']]),
    E('GET','/api/ai/mistral','Mistral AI',[P('apikey','string',true,'Your API key'),P('q','string',true,'Your message')],[['apikey','your_key'],['q','Give me 3 productivity tips']]),
    E('GET','/api/ai/custom','Custom AI (system prompt)',[P('apikey','string',true,'Your API key'),P('q','string',true,'User message'),P('prompt','string',false,'System prompt (default: helpful assistant)')],[['apikey','your_key'],['q','Ahoy!'],['prompt','You are a pirate. Always respond in pirate speak.']]),
    E('GET','/api/ai/muslim','Islamic AI',[P('apikey','string',true,'Your API key'),P('q','string',true,'Your Islamic question')],[['apikey','your_key'],['q','What does Islam say about patience?']]),
  ]},
  {id:'img',title:'Image Generation',eps:[
    E('GET','/api/ai/imagine','AI Image (any model)',[P('apikey','string',true,'Your API key'),P('prompt','string',true,'Image description'),P('model','string',false,'flux / flux-realism (default: flux)'),P('width','number',false,'Width px (default 1024)'),P('height','number',false,'Height px (default 1024)')],[['apikey','your_key'],['prompt','a beautiful sunset over mountains, digital art'],['model','flux']]),
    E('GET','/api/ai/flux','Flux Image',[P('apikey','string',true,'Your API key'),P('prompt','string',true,'Image description'),P('ratio','string',false,'1:1 / 16:9 / 9:16 / 4:3 (default 1:1)')],[['apikey','your_key'],['prompt','futuristic city at night, neon lights'],['ratio','16:9']]),
    E('GET','/api/ai/sora','Sora Image',[P('apikey','string',true,'Your API key'),P('prompt','string',true,'Image description')],[['apikey','your_key'],['prompt','a cute cat wearing sunglasses on a beach']]),

// live stats
async function loadStats(){
  try{
    const d=await fetch('/api/stats').then(r=>r.json());
    document.getElementById('ns-up').textContent=d.uptime||'—';
    document.getElementById('ns-mem').textContent=(d.memory_mb||'—')+' MB';
    document.getElementById('ns-req').textContent=(d.total_requests||0).toLocaleString();
  }catch{}
}
loadStats();setInterval(loadStats,10000);
