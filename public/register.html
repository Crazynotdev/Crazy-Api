<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CrazyApi — Register</title>
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;600;700&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07080e;--s1:#0e0e1a;--s2:#141422;--s3:#1c1c2e;--b:#1f1f33;--b2:#2b2b45;--ac:#6c63ff;--ac2:#a78bfa;--acl:rgba(108,99,255,.1);--gr:#22c55e;--rd:#ef4444;--pk:#ec4899;--tx:#f0f0f8;--tx2:#8888a8;--dim:#404060}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:linear-gradient(var(--b) 0%,transparent 0%) 0 0/44px 44px,linear-gradient(90deg,var(--b) 0%,transparent 0%) 0 0/44px 44px;opacity:.4}
#nav{position:sticky;top:0;z-index:200;height:52px;display:flex;align-items:center;padding:0 1.25rem;gap:1.25rem;background:rgba(7,8,14,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--b)}
.logo{font-weight:800;font-size:1.1rem;letter-spacing:-.4px;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-decoration:none}
.nav-links{display:flex;gap:.1rem}
.nl{padding:.32rem .7rem;border-radius:6px;color:var(--tx2);font-size:.78rem;font-weight:500;text-decoration:none;transition:all .13s}
.nl:hover,.nl.on{color:var(--tx);background:var(--s3)}
.nav-right{margin-left:auto;display:flex;gap:.4rem}
.nb{padding:.32rem .875rem;border-radius:6px;font-size:.77rem;font-weight:600;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all .13s;text-decoration:none;display:inline-block}
.nb-o{background:var(--s3);color:var(--tx2);border:1px solid var(--b2)}.nb-o:hover{color:var(--tx)}
.nb-s{background:var(--ac);color:#fff}.nb-s:hover{background:var(--ac2)}
.wrap{max-width:860px;margin:0 auto;padding:2.5rem 1.5rem 5rem;position:relative;z-index:1}
h1{font-size:1.85rem;font-weight:900;letter-spacing:-.6px;margin-bottom:.4rem}
.tag{font-size:.62rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--ac2);font-family:'Geist Mono',monospace;margin-bottom:.5rem}
.lead{color:var(--tx2);font-size:.92rem;line-height:1.75;margin-bottom:2.5rem;max-width:580px}
.sec h2{font-size:1.1rem;font-weight:700;margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:1px solid var(--b);display:flex;align-items:center;gap:.5rem}
.sec h2::before{content:'';width:3px;height:1em;background:var(--ac);border-radius:2px;flex-shrink:0;display:inline-block}
.sec{margin-bottom:2.5rem}
.p{color:var(--tx2);font-size:.88rem;line-height:1.8;margin-bottom:.875rem}
.code{background:var(--s2);border:1px solid var(--b);border-radius:7px;padding:.875rem 1rem;font-family:'Geist Mono',monospace;font-size:.76rem;color:var(--ac2);white-space:pre;overflow-x:auto;line-height:1.75;margin:.875rem 0}
.ic{background:var(--s2);border:1px solid var(--b);color:var(--ac2);padding:1px 5px;border-radius:3px;font-family:'Geist Mono',monospace;font-size:.82em}
.tbl{width:100%;border-collapse:collapse;font-size:.82rem;margin:.875rem 0;border-radius:7px;overflow:hidden;border:1px solid var(--b)}
.tbl th{background:var(--s2);color:var(--tx2);text-align:left;padding:.55rem .875rem;font-size:.65rem;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.tbl td{padding:.65rem .875rem;border-top:1px solid var(--b);color:var(--tx)}
.btn{padding:.6rem 1.25rem;border-radius:7px;font-size:.84rem;font-weight:700;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:all .15s;text-decoration:none;display:inline-block}
.btn-p{background:var(--ac);color:#fff}.btn-p:hover{background:var(--ac2);transform:translateY(-1px)}
.btn-s{background:var(--s2);color:var(--tx);border:1px solid var(--b2)}.btn-s:hover{border-color:var(--ac);color:var(--ac2)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.75rem;margin-top:1.25rem}
.gc{background:var(--s1);border:1px solid var(--b);border-radius:9px;padding:1.1rem}
.gc-n{font-size:.88rem;font-weight:700;margin-bottom:.2rem}
.gc-d{color:var(--tx2);font-size:.76rem;line-height:1.55}
.f-group{margin-bottom:.875rem}
.f-label{display:block;font-size:.76rem;font-weight:600;color:var(--tx2);margin-bottom:.35rem}
.f-inp{width:100%;padding:.58rem .875rem;background:var(--s2);border:1px solid var(--b2);border-radius:7px;color:var(--tx);font-family:'Inter',sans-serif;font-size:.88rem;outline:none;transition:border-color .15s}
.f-inp:focus{border-color:var(--ac)}
.f-inp::placeholder{color:var(--dim)}
.f-btn{width:100%;padding:.65rem;background:var(--ac);color:#fff;border:none;border-radius:7px;font-weight:700;font-size:.9rem;cursor:pointer;font-family:'Inter',sans-serif;transition:all .18s;margin-top:.35rem;display:flex;align-items:center;justify-content:center;gap:.45rem}
.f-btn:hover{background:var(--ac2);transform:translateY(-1px)}
.f-btn:disabled{opacity:.6;transform:none;cursor:not-allowed}
.f-err{background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);color:#fca5a5;border-radius:6px;padding:.55rem .8rem;font-size:.77rem;margin-bottom:.875rem;display:none}
.f-ok{background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.2);color:#4ade80;border-radius:6px;padding:.55rem .8rem;font-size:.77rem;margin-bottom:.875rem;display:none}
.key-box{background:var(--s2);border:1px solid rgba(108,99,255,.3);border-radius:8px;padding:1rem;margin-bottom:1rem}
.key-lbl{font-size:.6rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--tx2);margin-bottom:.4rem;font-family:'Geist Mono',monospace}
.key-row{background:var(--bg);border:1px solid var(--b);border-radius:6px;padding:.55rem .8rem;font-family:'Geist Mono',monospace;font-size:.77rem;color:var(--ac2);display:flex;align-items:center;gap:.4rem;word-break:break-all}
.cp-btn{background:none;border:none;color:var(--dim);cursor:pointer;font-size:.7rem;padding:.18rem .35rem;border-radius:3px;transition:color .13s;flex-shrink:0}
.cp-btn:hover{color:var(--tx)}
.spin{display:none;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:sp .5s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.dash-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:.75rem;margin-bottom:1.25rem}
.dc{background:var(--s1);border:1px solid var(--b);border-radius:9px;padding:1rem}
.dc-l{font-size:.62rem;font-weight:700;color:var(--tx2);text-transform:uppercase;letter-spacing:.7px;margin-bottom:.3rem}
.dc-v{font-size:1.4rem;font-weight:800;letter-spacing:-.3px}
.dc-s{font-size:.7rem;color:var(--tx2);margin-top:.15rem}
.plan{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.67rem;font-weight:700;font-family:'Geist Mono',monospace}
.free{background:var(--acl);color:var(--ac2);border:1px solid rgba(108,99,255,.22)}
.pro{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.22)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}
.toast{position:fixed;bottom:1.2rem;right:1.2rem;background:var(--s3);border:1px solid var(--b2);color:var(--tx);padding:.55rem 1rem;border-radius:7px;font-size:.78rem;font-weight:600;z-index:9999;transform:translateY(14px);opacity:0;transition:all .22s;pointer-events:none}
.toast.show{transform:translateY(0);opacity:1}
@media(max-width:600px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav id="nav">
  <a class="logo" href="/">CrazyApi</a>
  <div class="nav-links">
    <a class="nl" href="/">APIs</a>
    <a class="nl" href="/home.html">Home</a>
    <a class="nl" href="/docs.html">Docs</a>
    <a class="nl" href="/changelog.html">Changelog</a>
    <a class="nl" href="/contact.html">Contact</a>
  </div>
  <div class="nav-right">
    <a class="nb nb-o" href="/login.html">Login</a>
    <a class="nb nb-s" href="/register.html" class="on">Get API Key &rarr;</a>
  </div>
</nav>
<div style="min-height:calc(100vh - 52px);display:flex;align-items:center;justify-content:center;padding:2rem;position:relative;z-index:1">
  <div style="background:var(--s1);border:1px solid var(--b2);border-radius:14px;padding:2rem;width:100%;max-width:420px">
    <div style="text-align:center;font-size:1.25rem;font-weight:800;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:1.5rem">CrazyApi</div>
    <div style="font-size:1.15rem;font-weight:800;text-align:center;margin-bottom:.3rem">Create your account</div>
    <div style="color:var(--tx2);font-size:.83rem;text-align:center;margin-bottom:1.5rem">Free forever. Get your API key instantly.</div>
    <div class="f-err" id="err"></div>
    <div class="f-ok" id="ok"></div>
    <div class="key-box" id="key-box" style="display:none">
      <div class="key-lbl">🎉 Your API Key — Save it now!</div>
      <div class="key-row"><span id="key-val" style="flex:1;word-break:break-all">—</span><button class="cp-btn" onclick="copyId('key-val')">copy</button></div>
      <p style="color:var(--tx2);font-size:.74rem;margin-top:.6rem">Use <span style="background:var(--bg);border:1px solid var(--b);color:var(--ac2);padding:0 4px;border-radius:3px;font-family:'Geist Mono',monospace;font-size:.82em">?apikey=KEY</span> on every request.</p>
      <a href="/dashboard.html" style="display:inline-block;margin-top:.875rem;background:var(--ac);color:#fff;padding:.45rem 1rem;border-radius:6px;font-size:.82rem;font-weight:700;text-decoration:none">Go to Dashboard &rarr;</a>
    </div>
    <div id="form">
      <div class="f-group"><label class="f-label">Username</label><input class="f-inp" id="uname" placeholder="cooldevname" autocomplete="username"/></div>
      <div class="f-group"><label class="f-label">Email</label><input class="f-inp" type="email" id="email" placeholder="you@example.com" autocomplete="email"/></div>
      <div class="f-group"><label class="f-label">Password</label><input class="f-inp" type="password" id="pass" placeholder="Min. 8 characters" autocomplete="new-password"/></div>
      <button class="f-btn" id="btn" onclick="doRegister()">Create Free Account <div class="spin" id="spin"></div></button>
    </div>
    <div style="text-align:center;margin-top:1.25rem;font-size:.82rem;color:var(--tx2)">Already registered? <a href="/login.html" style="color:var(--ac2);font-weight:600">Login</a></div>
    <div style="margin-top:1.5rem;padding-top:1.1rem;border-top:1px solid var(--b);display:flex;gap:1.25rem;justify-content:center;font-size:.72rem;color:var(--dim)"><span>✓ Free forever</span><span>✓ No credit card</span><span>✓ 130+ endpoints</span></div>
  </div>
</div>
<script>

let _tt;
const toast=m=>{const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2500);};
function copyId(id){const v=document.getElementById(id)?.textContent?.trim();if(v)navigator.clipboard.writeText(v).then(()=>toast('Copied!'));}

const Auth={get(){try{return JSON.parse(localStorage.getItem('ca')||'null')}catch{return null}},set(d){localStorage.setItem('ca',JSON.stringify(d))}};
if(Auth.get()?.token) location.href='/dashboard.html';
async function doRegister(){
  const btn=document.getElementById('btn'),spin=document.getElementById('spin'),err=document.getElementById('err'),ok=document.getElementById('ok');
  const username=document.getElementById('uname').value.trim(),email=document.getElementById('email').value.trim(),password=document.getElementById('pass').value;
  err.style.display='none';ok.style.display='none';
  if(!username||!email||!password){err.textContent='All fields required.';err.style.display='block';return;}
  if(username.length<3){err.textContent='Username min 3 chars.';err.style.display='block';return;}
  if(password.length<8){err.textContent='Password min 8 chars.';err.style.display='block';return;}
  btn.disabled=true;spin.style.display='inline-block';
  try{
    const r=await fetch('/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,email,password})});
    const d=await r.json();
    if(d.status){
      document.getElementById('form').style.display='none';
      ok.textContent='Account created successfully!';ok.style.display='block';
      document.getElementById('key-val').textContent=d.apikey;
      document.getElementById('key-box').style.display='block';
    }else{err.textContent=d.error||'Registration failed.';err.style.display='block';}
  }catch(ex){err.textContent='Network error: '+ex.message;err.style.display='block';}
  btn.disabled=false;spin.style.display='none';
}
document.getElementById('pass').addEventListener('keydown',e=>{if(e.key==='Enter')doRegister();});
</script>
<div class="toast" id="toast"></div>
</body>
</html>
