<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>
<nav id="nav">

    <a class="nav-a always" href="/downloader" data-page="downloader">Downloaders</a>
    <a class="nav-a active"  href="/tools" class="active"      data-page="tools">Tools</a>

<script>

renderCategoryPage('tools',

  document.getElementById('cat-sidebar')
